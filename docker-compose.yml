services:

  # Single container : nginx + php-fpm + reverb (via supervisord)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: filesharing_app
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "80"
    ports:
      - "80:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
